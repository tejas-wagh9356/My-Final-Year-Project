<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login | Certificate Portal</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            height: 100vh;
            background: linear-gradient(135deg, #1d2671, #c33764);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box{
            background: #ffffff;
            width: 360px;
            padding: 35px 30px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            text-align: center;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn{
            from{
                opacity: 0;
                transform: translateY(20px);
            }
            to{
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon{
            width: 70px;
            height: 70px;
            margin: 0 auto 15px;
            background: #2c7be5;
            color: #fff;
            font-size: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        h2{
            margin-bottom: 5px;
            color: #333;
        }

        p{
            font-size: 14px;
            color: #777;
            margin-bottom: 25px;
        }

        input{
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        input:focus{
            outline: none;
            border-color: #2c7be5;
        }

        button{
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #2c7be5;
            color: #fff;
            border: none;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            background: #1b5fd1;
        }

        .footer-text{
            margin-top: 18px;
            font-size: 13px;
            color: #777;
        }
    </style>
</head>

<body>

<div class="box">
    <div class="icon">👑</div>

    <h2>Admin Login</h2>
    <p>Authorized access only</p>

    <form action="admin_login.php" method="post">
        <input type="text" name="username" placeholder="Admin Username" required>
        <input type="password" name="password" placeholder="Admin Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="footer-text">
        Certificate Generator Portal
    </div>
</div>

</body>
</html>
